name: release

# Run GoReleaser on every pushed semver tag (e.g. `git tag v1.2.3 && git push --tags`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release and upload artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the changelog and version resolve

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
