# Reference OpenVPN server with --tls-crypt: every control-channel packet is
# authenticated with HMAC-SHA256 and encrypted with AES-256-CTR under a shared
# static key. Data channel stays AES-256-GCM.
dev tun
proto udp
port 1194
topology subnet
server 10.8.0.0 255.255.255.0
ca /pki/ca.crt
cert /pki/server.crt
key /pki/server.key
dh none
tls-crypt /pki/ta.key
data-ciphers AES-256-GCM
data-ciphers-fallback AES-256-GCM
keepalive 10 60
verb 4
