# Reference OpenVPN server with the older AES-256-CBC data channel (encrypt-then-
# MAC, HMAC-SHA256) instead of AES-GCM, plain TLS control channel. This exercises
# the veepin client's non-AEAD data path.
dev tun
proto udp
port 1194
topology subnet
server 10.8.0.0 255.255.255.0
ca /pki/ca.crt
cert /pki/server.crt
key /pki/server.key
dh none
cipher AES-256-CBC
data-ciphers AES-256-CBC
data-ciphers-fallback AES-256-CBC
auth SHA256
keepalive 10 60
verb 4
