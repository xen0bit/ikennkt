# Reference OpenVPN server with --tls-auth: an HMAC over every control-channel
# packet, keyed by a shared static key, digest SHA256. Data channel stays
# AES-256-GCM. The client must present the same key with key-direction 1.
dev tun
proto udp
port 1194
topology subnet
server 10.8.0.0 255.255.255.0
ca /pki/ca.crt
cert /pki/server.crt
key /pki/server.key
dh none
tls-auth /pki/ta.key 0
auth SHA256
data-ciphers AES-256-GCM
data-ciphers-fallback AES-256-GCM
keepalive 10 60
verb 4
