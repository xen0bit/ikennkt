# Direction A with certificate (pubkey) auth: veepin client (ikev2) -> strongSwan
# responder, both authenticating with ECDSA certificates chaining to a shared CA.
# strongSwan negotiates the RFC 7427 Digital Signature (AUTH method 14). The
# strongSwan side mints the throwaway PKI into the shared `pki` volume; the veepin
# client reads its cert/key and the CA from there. Data-path check: the client
# pings 10.20.30.254 (a strongSwan-side address inside the tunnel).
name: veepin-interop-a-cert

volumes:
  pki:

services:
  strongswan-server:
    build:
      context: strongswan
    image: interop-strongswan
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv4.ip_forward: "1"
    volumes:
      - ./strongswan/swanctl-server-cert.conf:/etc/swanctl/swanctl.conf:ro
      - ./strongswan/server-entrypoint-cert.sh:/entrypoint.sh:ro
      - pki:/pki
    command: ["/bin/sh", "/entrypoint.sh"]

  veepin-client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [strongswan-server]
    environment:
      SERVER: "strongswan-server"
      CLIENT_ID: "client.example.com"
      SERVER_ID: "vpn.example.com"
    volumes:
      - ./veepin/client-entrypoint-cert.sh:/entrypoint.sh:ro
      - pki:/pki
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
