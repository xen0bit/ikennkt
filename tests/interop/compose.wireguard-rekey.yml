# veepin WireGuard client -> veepin WireGuard server, with a fast rekey interval.
# The rekey proof: the client re-runs the handshake every REKEY_SECONDS, rotating
# a fresh keypair (and a new receiver index) into a live tunnel. A sustained ping
# that never drops across those rotations shows the keypair-set data path holds
# the tunnel open, and the server's repeated "handshake complete" logs show the
# rekeys are actually happening rather than one long-lived session coasting.
name: veepin-interop-wg-rekey

x-wg-keys: &wg-keys
  SERVER_PRIVATE: "+IRmjL6NRpthikeXn+jGUJNLe1ZJKQaqeWubiG9+GHs="
  SERVER_PUBLIC: "srb9CBWUN+UL2CYhqHoL+rGKFPNu6nUJiNStgH0EBWM="
  CLIENT_PRIVATE: "CHk+5XZnPhJ+UXfIx83SaePpgYrK+0/FqiPvNvTp3Hg="
  CLIENT_PUBLIC: "gjMMAROzi5lHFapIKeaAdJ2RhGe0lW24XysGzBd1OSM="
  PSK: "cjldFdAmi69yIFhc0Sms/5Yz6boVXkMZbMJl+RzzMZM="
  SERVER_TUN_IP: "10.10.10.1"
  CLIENT_TUN_IP: "10.10.10.2"

services:
  veepin-wg-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    environment:
      <<: *wg-keys
    volumes:
      - ./veepin/wg-server-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  veepin-wg-client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [veepin-wg-server]
    environment:
      <<: *wg-keys
      SERVER: "veepin-wg-server"
      # Rekey every 8s so a ~48s ping spans several key rotations.
      REKEY_SECONDS: "8"
    volumes:
      - ./veepin/wg-client-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
