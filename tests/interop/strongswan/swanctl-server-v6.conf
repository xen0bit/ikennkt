# strongSwan as the IKEv2 responder, dual-stack (Direction A: veepin ikev2 ->
# here). Same AES-GCM/PSK suite as swanctl-server.conf; the only difference is
# that it assigns the veepin client an IPv6 virtual address too and offers v4+v6
# traffic selectors, so one Child SA carries both families. Proves veepin's
# INTERNAL_IP6 config-mode assignment, its v6 traffic selector, and IPv6-in-ESP
# (next-header 41) interoperate with strongSwan.
connections {
    rw {
        version = 2
        proposals = aes256gcm16-prfsha256-curve25519
        rekey_time = 0
        pools = rw_pool, rw_pool6
        local {
            auth = psk
            id = vpn.example.com
        }
        remote {
            auth = psk
            id = client.example.com
        }
        children {
            rw {
                esp_proposals = aes256gcm16
                # Offer a full tunnel in both families; the negotiated remote TS
                # narrows to the client's assigned virtual IPs. 10.20.30.254 and
                # fd00:20:30::254 (added to lo by the entrypoint) are the in-tunnel
                # ping targets for the data-path check.
                local_ts = 0.0.0.0/0,::/0
                rekey_time = 0
            }
        }
    }
}

pools {
    rw_pool {
        addrs = 10.20.30.0/24
    }
    rw_pool6 {
        addrs = fd00:20:30::/64
    }
}

secrets {
    ike-rw {
        secret = "interop-test-psk"
    }
}
