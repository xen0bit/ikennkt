# strongSwan as the IKEv2 responder with certificate (pubkey) authentication
# (Direction A: veepin ikev2 client -> here). Both ends authenticate with an
# ECDSA certificate chaining to the shared CA; strongSwan negotiates the RFC 7427
# Digital Signature (AUTH method 14) that veepin implements. Suites match the one
# negotiable common set with veepin: IKE aes256gcm16-prfsha256-curve25519, ESP
# aes256gcm16.
connections {
    rw {
        version = 2
        proposals = aes256gcm16-prfsha256-curve25519
        rekey_time = 0
        pools = rw_pool
        local {
            auth = pubkey
            id = vpn.example.com
            certs = server-cert.pem
        }
        remote {
            auth = pubkey
            id = client.example.com
        }
        children {
            rw {
                esp_proposals = aes256gcm16
                local_ts = 0.0.0.0/0
                rekey_time = 0
            }
        }
    }
}

pools {
    rw_pool {
        addrs = 10.20.30.0/24
    }
}
