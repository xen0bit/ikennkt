# veepin <-> veepin nebula over real sockets and TUNs.
#
# Three hosts rather than two, because the point of this cell is the mesh shape:
# a veepin lighthouse plus two veepin members that are given *no* static entry
# for each other. The only way the ping can cross is if one member queries the
# lighthouse, the lighthouse answers and nudges the other to punch, and the two
# then handshake directly. A two-host version would pass without exercising any
# of that.
#
# Data-path check: host-b pings 10.42.0.3, which it can only reach by finding it.
name: veepin-interop-nebula-self

services:
  nebula-pki:
    build:
      context: nebula
    image: interop-nebula
    environment:
      HOSTS: "lighthouse=10.42.0.1/24 host-b=10.42.0.2/24 host-c=10.42.0.3/24"
    volumes:
      - pki:/pki
      - ./nebula/pki-entrypoint.sh:/pki-entrypoint.sh:ro
    command: ["/bin/sh", "/pki-entrypoint.sh"]

  veepin-lighthouse:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on:
      nebula-pki:
        condition: service_completed_successfully
    environment:
      NAME: "lighthouse"
      AM_LIGHTHOUSE: "true"
    volumes:
      - pki:/pki
      - ./veepin/nebula-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  veepin-host-b:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on:
      nebula-pki:
        condition: service_completed_successfully
      veepin-lighthouse:
        condition: service_started
    environment:
      NAME: "host-b"
      STATIC_HOSTS: "10.42.0.1=veepin-lighthouse:4242"
      LIGHTHOUSES: "10.42.0.1"
    volumes:
      - pki:/pki
      - ./veepin/nebula-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  veepin-host-c:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on:
      nebula-pki:
        condition: service_completed_successfully
      veepin-lighthouse:
        condition: service_started
    environment:
      NAME: "host-c"
      STATIC_HOSTS: "10.42.0.1=veepin-lighthouse:4242"
      LIGHTHOUSES: "10.42.0.1"
    volumes:
      - pki:/pki
      - ./veepin/nebula-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

volumes:
  pki:
