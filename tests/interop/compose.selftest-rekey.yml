# Child SA rekey (RFC 7296 2.8): veepin client <-> veepin server, with the
# client set to rekey its ESP SA every 2s (REKEY=2). It proves the client drives
# CREATE_CHILD_SA on a timer and swaps the data path onto the fresh SA without
# dropping traffic — the ping across the tunnel succeeds *after* several rekeys.
name: veepin-selftest-rekey

services:
  server:
    image: veepin:interop
    build:
      context: ../..
      dockerfile: Dockerfile
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    environment:
      PSK: "interop-test-psk"
      SERVER_ID: "vpn.example.com"
      POOL: "10.10.10.0/24"
    volumes:
      - ./veepin/server-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  client:
    image: veepin:interop
    build:
      context: ../..
      dockerfile: Dockerfile
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [server]
    environment:
      SERVER: "server"
      PSK: "interop-test-psk"
      CLIENT_ID: "client.example.com"
      SERVER_ID: "vpn.example.com"
      REKEY: "2"
    volumes:
      - ./veepin/client-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
